# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# In the idle state, peripherals such as displays and lighting are disabled, 
# but the keyboard remains connected to Bluetooth so it can immediately respond when you press a key.

# In the deep sleep state, the keyboard additionally disconnects from Bluetooth and any external power output is disabled. 
# This state uses very little power, but it may take a few seconds to reconnect after waking.

CONFIG_ZMK_EXT_POWER=y
# Enable support to control external power output

CONFIG_ZMK_SLEEP=y
# Enable deep sleep support

CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000
# Milliseconds of inactivity before entering deep sleep = 5 mins 

CONFIG_ZMK_IDLE_TIMEOUT=120000
# Milliseconds of inactivity before entering idle state = 2 mins


# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y

# Enable ZMK Studio (runtime keymap editing at https://zmk.studio).
# Paired with the `studio-rpc-usb-uart` snippet on the left/central half in build.yaml.
CONFIG_ZMK_STUDIO=y

# Key debounce left at ZMK's default (5ms press / 5ms release). A higher
# release debounce was tried to mask switch chatter, but the chatter was a
# hardware seating issue and is fixed, so debounce is back to standard.

# --- Latency / Bluetooth tuning ---

# Max BLE transmit power (+8 dBm) on the nRF52840. Stronger, more reliable
# link -> fewer delayed/retried packets. Small battery cost.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Request the fastest connection interval (6 = 7.5 ms) with no slave latency,
# so keystrokes are delivered every interval instead of being batched. Lower
# latency at some battery cost. (The host may negotiate a slightly higher
# interval, but this asks for the minimum.)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
